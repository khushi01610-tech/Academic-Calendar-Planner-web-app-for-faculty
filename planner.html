<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCTE Academic Calendar Planner</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      background: url('college-building.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: rgba(0, 0, 0, 0.7);
      text-align: center;
      padding: 25px;
      font-size: 2rem;
      font-weight: bold;
      border-bottom: 2px solid rgba(255,255,255,0.2);
    }

    .planner-container {
      flex: 1;
      display: flex;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(5px);
    }

    .sidebar {
      width: 25%;
      padding: 30px 20px;
      border-right: 1px solid rgba(255,255,255,0.2);
      overflow-y: auto;
    }

    .sidebar h2 {
      margin-bottom: 15px;
      font-size: 1.5rem;
      color: #ffd700;
      border-bottom: 2px solid #ffd700;
      padding-bottom: 5px;
    }

    .sidebar h3 {
      margin-top: 25px;
      font-size: 1.2rem;
      text-decoration: underline;
    }

    .feature-list {
      margin-top: 15px;
      list-style-type: none;
    }

    .feature-list li {
      padding: 8px 0;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .feature-list li::before {
      content: "✔";
      color: #ffd700;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 25px;
    }

    .month-section {
      margin-bottom: 40px;
    }

    .month-title {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: #ffd700;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding-bottom: 5px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-gap: 10px;
    }

    .day {
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      text-align: center;
      padding: 10px;
      min-height: 70px;
      transition: 0.3s;
      position: relative;
    }

    .day:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
      cursor: pointer;
    }

    .day strong {
      display: block;
      font-size: 1.2rem;
      color: #fff;
      margin-bottom: 6px;
    }

    .event {
      margin-top: 6px;
      background: #ffd700;
      color: #000;
      padding: 5px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      position: relative;
    }

    .event button {
      position: absolute;
      top: 3px;
      right: 5px;
      background: none;
      border: none;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 12px;
      background: rgba(0, 0, 0, 0.7);
      font-size: 0.9rem;
      color: #ddd;
    }

  </style>
</head>
<body>
  <header>🎓 PCTE GROUP OF INSTITUTES – Academic Calendar Planner 2025</header>

  <div class="planner-container">
    <aside class="sidebar">
      <h2>Faculty Dashboard</h2>
      <ul class="feature-list">
        <li>Add, Edit & Delete Events</li>
        <li>12-Month Academic Overview</li>
        <li>Faculty & Department Scheduling</li>
        <li>Meeting & Exam Planner</li>
        <li>Interactive Calendar View</li>
      </ul>
    </aside>

    <div class="main-content" id="main-content"></div>
  </div>

  <footer>© 2025 PCTE Group of Institutes | Faculty Academic Planner</footer>

  <script>
    const mainContent = document.getElementById('main-content');
    const months = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    months.forEach((month, mIndex) => {
      const monthSection = document.createElement('div');
      monthSection.classList.add('month-section');
      monthSection.innerHTML = `<div class='month-title'>${month}</div>`;
      const calendar = document.createElement('div');
      calendar.classList.add('calendar');
      monthSection.appendChild(calendar);
      mainContent.appendChild(monthSection);

      const daysInMonth = 30; // Simplified for demo; can be dynamic
      for (let i = 1; i <= daysInMonth; i++) {
        const dayDiv = document.createElement('div');
        dayDiv.classList.add('day');
        dayDiv.innerHTML = `<strong>${i}</strong>`;
        calendar.appendChild(dayDiv);

        dayDiv.addEventListener('click', (e) => {
          if (e.target.classList.contains('event') || e.target.tagName === 'BUTTON') return;
          const eventName = prompt(`Enter event for ${month} ${i}:`);
          if (eventName) {
            const eventDiv = document.createElement('div');
            eventDiv.classList.add('event');
            eventDiv.textContent = eventName;

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '×';
            deleteBtn.addEventListener('click', (ev) => {
              ev.stopPropagation();
              eventDiv.remove();
            });

            eventDiv.appendChild(deleteBtn);

            eventDiv.addEventListener('click', (ev) => {
              ev.stopPropagation();
              const newName = prompt('Edit event:', eventDiv.firstChild.textContent);
              if (newName) eventDiv.firstChild.textContent = newName;
            });

            dayDiv.appendChild(eventDiv);
          }
        });
      }
    });
  </script>
</body>
</html>
