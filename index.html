<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome | PCTE Academic Calendar Planner</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('college-building.png') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      flex-direction: column;
      background-color: rgba(0, 0, 0, 0.7);
      background-blend-mode: darken;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 15px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.6);
    }

    h2 {
      font-size: 1.3rem;
      font-weight: 400;
      margin-bottom: 40px;
      color: #ffdf00;
    }

    button {
      padding: 15px 35px;
      font-size: 1.1rem;
      background-color: #ffd700;
      color: #000;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    }

    button:hover {
      background-color: #fff;
      transform: scale(1.05);
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>
  <h1>🎓 Welcome to PCTE Group of Institutes</h1>
  <h2>Academic Calendar Planner 2025</h2>

  <button onclick="location.href='planner.html'">Enter Planner</button>

  <footer>© 2025 PCTE Group of Institutes | Faculty Academic Portal</footer>
</body>
</html>
